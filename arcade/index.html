<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>Gimnasio Financiero - Ahorro Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#10b981', background: '#f8fafc' }, fontFamily: { display: ['Outfit', 'sans-serif'], body: ['Plus Jakarta Sans', 'sans-serif'] } } } }
    </script>
    <style>
        body { background: radial-gradient(circle at top right, #f0fdf4, #f8fafc 50%), radial-gradient(circle at bottom left, #eff6ff, #f8fafc 50%); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
    
    <script type="module" src="../menu.js"></script>
</head>
<body class="font-body text-slate-800 p-4">

    <app-sidebar base-path="../"></app-sidebar>

    <div class="max-w-md mx-auto flex items-center mb-8 relative mt-4">
        <button onclick="window.toggleSidebar()" class="absolute left-0 p-2 text-slate-500 hover:text-primary transition-colors">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <div class="w-full text-center">
            <h1 class="text-4xl font-display font-black text-slate-900 mb-1">Gimnasio <span class="text-primary">Financiero</span></h1>
            <p class="text-slate-500 font-medium">Aprende a jugar el juego del dinero.</p>
        </div>
    </div>

    <div class="max-w-md mx-auto space-y-4">

        <a href="../guerra-capital/index.html" class="block glass-card rounded-3xl p-6 shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300 relative overflow-hidden group border-2 border-transparent hover:border-primary/30">
            <div class="absolute -right-6 -top-6 w-24 h-24 bg-primary/10 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
            <div class="flex items-center gap-5 relative z-10">
                <div class="w-16 h-16 bg-gradient-to-br from-emerald-400 to-primary rounded-2xl flex items-center justify-center text-3xl shadow-inner text-white">
                    🪖
                </div>
                <div>
                    <h2 class="text-xl font-display font-bold text-slate-800">La Guerra del Capital</h2>
                    <p class="text-sm text-slate-500 mt-1">El Duolingo de las finanzas. Superá trincheras de conocimiento y conquistá tu libertad.</p>
                </div>
            </div>
        </a>

        <a href="ahorro-run.html" class="block glass-card rounded-3xl p-6 shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300 relative overflow-hidden group border-2 border-transparent hover:border-primary/30">
            <div class="absolute -right-6 -top-6 w-24 h-24 bg-primary/10 rounded-full group-hover:scale-150 transition-transform duration-500"></div>
            <div class="flex items-center gap-5 relative z-10">
                <div class="w-16 h-16 bg-gradient-to-br from-emerald-400 to-primary rounded-2xl flex items-center justify-center text-3xl shadow-inner text-white">
                    🏃‍♂️
                </div>
                <div>
                    <h2 class="text-xl font-display font-bold text-slate-800">Ahorro Run</h2>
                    <p class="text-sm text-slate-500 mt-1">Simulador de decisiones. Esquivá deudas y armá tu imperio en 36 segundos.</p>
                </div>
            </div>
        </a>

        <div class="glass-card rounded-3xl p-6 border border-dashed border-slate-300 opacity-50 flex items-center justify-center mt-8">
            <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">+ Próximamente</p>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByAQh5iPU5B8JWA4KrQOyphzW9sAgsxDg",
            authDomain: "ahorro-dinamico.firebaseapp.com",
            projectId: "ahorro-dinamico",
            storageBucket: "ahorro-dinamico.firebasestorage.app",
            messagingSenderId: "906931960122",
            appId: "1:906931960122:web:02b6d090d163c2c135f803"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Si alguien intenta entrar con la URL sin estar logueado en la memoria local, se lo patea al inicio
        if (!localStorage.getItem('local_user_status')) {
            window.location.href = '../index.html';
        }

        // Función para que funcione el botón Cerrar Sesión del Menú Lateral
        window.logout = () => {
            localStorage.removeItem('local_user_status');
            signOut(auth).then(() => { window.location.href = '../index.html'; });
        };
    </script>
</body>
</html>
