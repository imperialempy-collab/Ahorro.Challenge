<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahorro Challenge DINÁMICO</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#10b981">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#10b981', secondary: '#0ea5e9', background: '#f8fafc' }, fontFamily: { display: ['Outfit', 'sans-serif'], body: ['Plus Jakarta Sans', 'sans-serif'] } } } }
    </script>
    <style>
        body { background: radial-gradient(circle at top right, #f0fdf4, #f8fafc 50%), radial-gradient(circle at bottom left, #eff6ff, #f8fafc 50%); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .badge-active { background: #10b981 !important; color: white !important; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2); }
        .sticky-header { position: sticky; top: 0; z-index: 50; padding-top: 1rem; padding-bottom: 1rem; }
        .btn-view-active { border-color: #10b981 !important; color: #10b981 !important; font-weight: 700; }
        .btn-view-inactive { border-color: #e2e8f0 !important; color: #94a3b8 !important; }
    </style>
</head>
<body class="font-body text-slate-800">

    <div class="sticky-header glass-card border-b border-slate-200 px-4">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="w-full md:w-auto text-center md:text-left">
                <h1 class="text-2xl font-display font-bold text-slate-900">Ahorro <span class="text-primary uppercase tracking-tighter">Dinámico</span></h1>
                <div class="flex gap-2 mt-1 justify-center md:justify-start">
                    <button onclick="setStatsView('COLECTIVO')" id="btnViewCol" class="px-3 py-1 text-[10px] rounded-full border transition-all">COLECTIVO</button>
                    <button onclick="setStatsView('INDIVIDUAL')" id="btnViewInd" class="px-3 py-1 text-[10px] rounded-full border transition-all">INDIVIDUAL</button>
                </div>
            </div>

            <div class="flex items-center gap-4 bg-white/50 p-3 rounded-2xl border border-white shadow-sm min-w-[300px]">
                <div class="relative w-12 h-12 shrink-0">
                    <svg class="w-full h-full transform -rotate-90">
                        <circle cx="24" cy="24" r="21" stroke="currentColor" stroke-width="4" fill="transparent" class="text-slate-100" />
                        <circle id="globalProgressCircle" cx="24" cy="24" r="21" stroke="currentColor" stroke-width="4" fill="transparent" stroke-dasharray="131.9" stroke-dashoffset="131.9" class="text-primary transition-all duration-700" />
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center text-[10px] font-bold" id="progressPercentage">0%</div>
                </div>
                <div class="flex-grow">
                    <div class="text-[9px] font-bold uppercase text-slate-400" id="statsTitle">Total Colectivo</div>
                    <div class="text-lg font-bold font-display text-slate-900 leading-tight" id="totalSavedCounter">0 Gs.</div>
                    <div class="text-[10px] font-semibold text-primary" id="metaLabel">Meta: 13.780.000 Gs. c/u</div>
                </div>
                <button onclick="configReto()" class="p-2 bg-slate-100 rounded-full hover:bg-slate-200 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 pb-10 mt-6">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <aside class="space-y-4">
                <div class="glass-card rounded-2xl p-4 shadow-sm border border-white">
                    <h2 class="text-[11px] font-bold mb-3 uppercase tracking-wider text-slate-500">Participantes</h2>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="newParticipantInput" placeholder="Nombre..." class="w-full bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-sm outline-none focus:ring-1 focus:ring-primary">
                        <button onclick="addParticipant()" class="bg-primary text-white px-3 rounded-lg hover:bg-emerald-600 font-bold">+</button>
                    </div>
                    <div id="participantList" class="space-y-1"></div>
                </div>
                <button onclick="confirmReset()" class="w-full py-2 text-[10px] font-bold text-rose-300 hover:text-rose-500">RESETEAR TODO</button>
            </aside>

            <main class="lg:col-span-3">
                <div id="goalsList" class="space-y-2"></div>
            </main>
        </div>
    </div>

    <script>
        const DB_KEY = 'ahorro_dinamico_vSólida';
        let config = { meta: 13780000, semanas: 52 };
        let participants = []; 
        let activeParticipant = ""; 
        let statsView = "COLECTIVO";
        let userProgress = {}; 
        let userSchedules = {}; // Aquí guardamos la escalera fija por usuario

        const formatPYG = (n) => new Intl.NumberFormat('es-PY').format(Math.round(n || 0)) + ' Gs.';

        function save() { 
            localStorage.setItem(DB_KEY, JSON.stringify({ config, participants, activeParticipant, statsView, userProgress, userSchedules })); 
        }

        function load() {
            const saved = localStorage.getItem(DB_KEY);
            if (saved) {
                const p = JSON.parse(saved);
                config = p.config || config;
                participants = p.participants || [];
                activeParticipant = p.activeParticipant || "";
                statsView = p.statsView || "COLECTIVO";
                userProgress = p.userProgress || {};
                userSchedules = p.userSchedules || {};
            }
        }

        function configReto() {
            const m = prompt("¿Cuál es la meta total?", config.meta);
            const s = prompt("¿En cuántas semanas?", config.semanas);
            if (m && s) {
                if (confirm("Se reiniciará el progreso para el nuevo plan. ¿Continuar?")) {
                    config.meta = parseInt(m.replace(/\D/g,''));
                    config.semanas = parseInt(s.replace(/\D/g,''));
                    userProgress = {};
                    userSchedules = {};
                    save();
                    location.reload();
                }
            }
        }

        // --- GENERACIÓN Y RECALCULADO ---
        function generateSchedule(nombreUser) {
            const metaTotal = config.meta;
            const totalSemanas = config.semanas;
            let schedule = [];
            
            // Progresión aritmética básica inicial
            const promedio = metaTotal / totalSemanas;
            const incremento = (promedio * 0.8) / totalSemanas;
            
            for (let i = 1; i <= totalSemanas; i++) {
                const factor = i - (totalSemanas + 1) / 2;
                let monto = promedio + (factor * incremento);
                schedule.push(Math.ceil(Math.max(monto, 5000) / 1000) * 1000);
            }
            userSchedules[nombreUser] = schedule;
        }

        function recalculateRemaining(nombreUser) {
            const metaTotal = config.meta;
            const totalSemanas = config.semanas;
            const misPagos = userProgress[nombreUser] || [];
            
            const yaPagado = misPagos.reduce((acc, p) => acc + p.pagado, 0);
            const semanasRestantes = totalSemanas - misPagos.length;
            
            if (semanasRestantes <= 0) return;

            const restoDinero = metaTotal - yaPagado;
            const promedio = restoDinero / semanasRestantes;
            const incremento = (promedio * 0.8) / semanasRestantes;
            
            let newSchedule = [...userSchedules[nombreUser]];
            
            // Solo recalculamos las posiciones que NO han sido pagadas
            let count = 1;
            for (let i = 0; i < totalSemanas; i++) {
                const yaEstaPaga = misPagos.some(p => p.semana === (i + 1));
                if (!yaEstaPaga) {
                    const factor = count - (semanasRestantes + 1) / 2;
                    let monto = promedio + (factor * incremento);
                    newSchedule[i] = Math.ceil(Math.max(monto, 5000) / 1000) * 1000;
                    count++;
                }
            }
            userSchedules[nombreUser] = newSchedule;
        }

        function addParticipant() {
            const n = document.getElementById('newParticipantInput').value.trim().toUpperCase();
            if (n && !participants.includes(n)) {
                participants.push(n);
                userProgress[n] = [];
                generateSchedule(n); // Generar su escalera fija al crear
                if (!activeParticipant) activeParticipant = n;
                document.getElementById('newParticipantInput').value = ''; save(); renderParticipants(); renderGoals(); updateStats();
            }
        }

        function deleteParticipant(n) {
            if (confirm(`¿Eliminar a ${n}?`)) {
                participants = participants.filter(p => p !== n);
                delete userProgress[n];
                delete userSchedules[n];
                if (activeParticipant === n) activeParticipant = participants[0] || "";
                save(); renderParticipants(); renderGoals(); updateStats();
            }
        }

        function setActiveParticipant(n) { activeParticipant = n; save(); renderParticipants(); renderGoals(); updateStats(); scrollToNext(); }

        function setStatsView(v) { statsView = v; updateStats(); updateViewButtons(); renderGoals(); }

        function updateViewButtons() {
            const colBtn = document.getElementById('btnViewCol');
            const indBtn = document.getElementById('btnViewInd');
            if (statsView === 'COLECTIVO') {
                colBtn.className = "px-3 py-1 text-[10px] rounded-full border transition-all btn-view-active";
                indBtn.className = "px-3 py-1 text-[10px] rounded-full border transition-all btn-view-inactive";
            } else {
                colBtn.className = "px-3 py-1 text-[10px] rounded-full border transition-all btn-view-inactive";
                indBtn.className = "px-3 py-1 text-[10px] rounded-full border transition-all btn-view-active";
            }
        }

        function toggle(semanaNum) {
            if (!activeParticipant) return alert("Seleccioná un participante");
            const pIdx = userProgress[activeParticipant].findIndex(p => p.semana === semanaNum);
            
            if (pIdx > -1) {
                userProgress[activeParticipant].splice(pIdx, 1);
                recalculateRemaining(activeParticipant); // Re-equilibrar al desmarcar
            } else {
                // Usa el monto que ya estaba "congelado" en su schedule
                const montoOriginal = userSchedules[activeParticipant][semanaNum - 1];
                const d = new Date().toLocaleDateString('es-PY', { day: 'numeric', month: 'short' });
                userProgress[activeParticipant].push({ semana: semanaNum, pagado: montoOriginal, fecha: d });
                // NO recalculamos si el monto es el original
            }
            save(); renderGoals(); updateStats();
        }

        function promptManual(semNum) {
            if (!activeParticipant) return alert("Seleccioná un participante");
            const previsto = userSchedules[activeParticipant][semNum - 1];
            const val = prompt("Ingresá el monto real:", previsto);
            if (val !== null) {
                const num = parseInt(val.replace(/\D/g,''));
                if (num > 0) {
                    const pIdx = userProgress[activeParticipant].findIndex(p => p.semana === semNum);
                    const d = new Date().toLocaleDateString('es-PY', { day: 'numeric', month: 'short' });
                    
                    if (pIdx > -1) { userProgress[activeParticipant][pIdx].pagado = num; }
                    else { userProgress[activeParticipant].push({ semana: semNum, pagado: num, fecha: d }); }
                    
                    // SI recalculamos porque hubo un cambio manual
                    recalculateRemaining(activeParticipant);
                    save(); renderGoals(); updateStats();
                }
            }
        }

        function updateStats() {
            let total = 0;
            Object.values(userProgress).forEach(pagos => pagos.forEach(p => total += p.pagado));
            if (statsView === 'COLECTIVO') {
                document.getElementById('statsTitle').innerText = "Total Colectivo";
                document.getElementById('metaLabel').innerText = `Meta: ${formatPYG(config.meta)} c/u`;
                const p = (total / (config.meta * (participants.length || 1))) * 100;
                document.getElementById('progressPercentage').innerText = Math.round(Math.min(p, 100)) + '%';
                document.getElementById('globalProgressCircle').style.strokeDashoffset = 131.9 - (Math.min(p, 100) / 100 * 131.9);
            } else {
                const miTotal = (userProgress[activeParticipant] || []).reduce((acc, p) => acc + p.pagado, 0);
                document.getElementById('statsTitle').innerText = `Ahorro de ${activeParticipant}`;
                const falta = config.meta - miTotal;
                document.getElementById('metaLabel').innerText = falta > 0 ? `Faltan: ${formatPYG(falta)}` : "¡META LOGRADA!";
                const p = (miTotal / config.meta) * 100;
                document.getElementById('progressPercentage').innerText = Math.round(Math.min(p, 100)) + '%';
                document.getElementById('globalProgressCircle').style.strokeDashoffset = 131.9 - (Math.min(p, 100) / 100 * 131.9);
                total = miTotal;
            }
            document.getElementById('totalSavedCounter').innerText = formatPYG(total);
        }

        function renderGoals() {
            const container = document.getElementById('goalsList');
            let html = "";
            for (let i = 1; i <= config.semanas; i++) {
                const globalCompletions = [];
                participants.forEach(p => {
                    const pago = (userProgress[p] || []).find(up => up.semana === i);
                    if (pago) globalCompletions.push({ name: p, ...pago });
                });
                const hechoPorMi = activeParticipant && (userProgress[activeParticipant] || []).some(up => up.semana === i);
                
                // Leemos el monto congelado del schedule para mostrarlo
                const montoMostrado = activeParticipant ? userSchedules[activeParticipant][i-1] : (config.meta / config.semanas);
                
                html += `
                <div id="goal-${i}" class="glass-card rounded-xl p-3 flex items-center gap-3 border-l-4 ${hechoPorMi ? 'border-l-primary shadow-md' : 'border-l-slate-200'}">
                    <div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-500 text-[10px] font-bold shrink-0">${i}</div>
                    <div class="flex-grow">
                        <div class="text-sm font-bold text-slate-800">${hechoPorMi ? 'COMPLETADO' : formatPYG(montoMostrado)}</div>
                        <div class="text-[8px] uppercase text-slate-400 font-bold">Depósito ${i}</div>
                    </div>
                    <div class="flex flex-col items-end gap-1 px-1">
                        ${globalCompletions.map(c => `
                            <div class="flex items-center gap-1 bg-white rounded-full pl-1 pr-2 py-0.5 border border-slate-100 shadow-sm">
                                <div class="h-4 w-4 rounded-full bg-primary text-[7px] flex items-center justify-center text-white font-black">${c.name[0]}</div>
                                <span class="text-[7px] font-bold text-slate-600 uppercase">${c.fecha} • ${formatPYG(c.pagado)}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="flex gap-1">
                        <button onclick="promptManual(${i})" class="p-2 rounded-lg text-slate-400 hover:text-primary transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                        </button>
                        <button onclick="toggle(${i})" class="px-4 py-2 rounded-lg text-[10px] font-bold transition-all ${hechoPorMi ? 'bg-primary text-white shadow-lg' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}">
                            ${hechoPorMi ? 'LISTO' : 'MARCAR'}
                        </button>
                    </div>
                </div>`;
            }
            container.innerHTML = html;
        }

        function renderParticipants() {
            const list = document.getElementById('participantList');
            if (!participants.length) { list.innerHTML = `<p class="text-[11px] text-slate-400 italic text-center">Agregá un nombre arriba</p>`; return; }
            list.innerHTML = participants.map(p => `
                <div class="flex items-center bg-white/50 rounded-lg p-1 mb-1">
                    <button onclick="setActiveParticipant('${p}')" class="flex-grow text-left px-3 py-2 text-xs font-bold rounded-md ${p === activeParticipant ? 'badge-active' : 'text-slate-500'}">${p}</button>
                    <button onclick="deleteParticipant('${p}')" class="px-2 text-slate-300 hover:text-rose-500 font-bold text-lg">×</button>
                </div>`).join('');
        }

        function scrollToNext() {
            if (!activeParticipant) return;
            const nextIndex = (userProgress[activeParticipant]?.length || 0) + 1;
            if (nextIndex <= config.semanas) {
                setTimeout(() => {
                    const el = document.getElementById(`goal-${nextIndex}`);
                    if (el) window.scrollTo({top: el.offsetTop - 180, behavior: 'smooth'});
                }, 300);
            }
        }

        load(); 
        updateViewButtons();
        renderParticipants(); 
        renderGoals(); 
        updateStats();
    </script>
</body>
</html>
