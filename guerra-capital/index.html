<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Guerra del Capital</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { primary: '#10b981', background: '#f0fdf4', surface: '#ffffff', danger: '#f43f5e', warning: '#f59e0b' }, 
                    fontFamily: { display: ['Outfit', 'sans-serif'], body: ['Plus Jakarta Sans', 'sans-serif'] } 
                } 
            } 
        }
    </script>
    <style>
        .map-bg { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
        .node-path { position: relative; }
        .node-path::after { content: ''; position: absolute; width: 4px; background-color: #cbd5e1; z-index: -1; top: 100%; left: 50%; transform: translateX(-50%); height: 60px; }
        .node-path:last-child::after { display: none; }
        /* Animaciones para las respuestas */
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body class="font-body text-slate-800 bg-background map-bg min-h-screen pb-20 select-none">

    <header class="bg-surface sticky top-0 z-40 border-b border-slate-200 p-4 flex justify-between items-center shadow-sm">
        <a href="../../arcade/index.html" class="text-slate-400 hover:text-slate-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </a>
        <div class="flex gap-4 font-black font-display text-lg">
            <div class="flex items-center gap-1 text-danger"><span class="text-xl">❤️</span> <span id="vidasUI">5</span></div>
            <div class="flex items-center gap-1 text-warning"><span class="text-xl">💰</span> <span id="monedasUI">0</span></div>
        </div>
    </header>

    <main class="max-w-md mx-auto py-10 px-4 flex flex-col items-center gap-[60px]" id="mapaContenedor">
        </main>

    <div id="battleModal" class="hidden fixed inset-0 bg-surface z-50 flex flex-col">
        <div class="h-2 bg-slate-100 w-full"><div id="battleProgress" class="h-full bg-primary transition-all duration-300" style="width: 0%"></div></div>
        
        <button onclick="cerrarBatalla()" class="absolute top-6 left-4 text-slate-400 hover:text-slate-600 z-10">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <div id="battleContent" class="flex-grow flex flex-col justify-center items-center px-6 py-10 max-w-lg mx-auto w-full">
            </div>

        <div id="feedbackContainer" class="hidden fixed bottom-0 left-0 right-0 p-6 bg-white border-t-2 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-20">
            <div class="max-w-lg mx-auto flex flex-col gap-3">
                <div class="flex items-center gap-3">
                    <div id="feedbackIcon" class="w-10 h-10 rounded-full flex items-center justify-center text-2xl font-black"></div>
                    <h3 id="feedbackTitle" class="text-xl font-display font-black"></h3>
                </div>
                <p id="feedbackText" class="text-sm font-medium"></p>
                <button id="btnContinuar" class="w-full py-4 rounded-2xl font-black text-white text-lg tracking-wide uppercase transition-transform active:scale-95 shadow-[0_4px_0_rgba(0,0,0,0.2)] mt-2"></button>
            </div>
        </div>
    </div>

    <script src="niveles.js"></script>
    <script>
        // ESTADO DEL JUGADOR
        let vidas = 5;
        let monedas = 0;
        let nivelActual = 1; // Nivel desbloqueado
        
        // ESTADO DE LA BATALLA ACTUAL
        let batallaActiva = null;
        let pantallaActualIndex = 0;

        // 1. DIBUJAR EL MAPA (ZIGZAG)
        function renderizarMapa() {
            const mapa = document.getElementById('mapaContenedor');
            mapa.innerHTML = '';
            
            // Dibujamos de atrás para adelante (el nivel 1 queda abajo)
            [...BATTLES].reverse().forEach((batalla, index) => {
                const isDesbloqueado = batalla.id <= nivelActual;
                const isActual = batalla.id === nivelActual;
                
                // Calculamos el margen para hacer el ZigZag
                const margen = index % 2 === 0 ? '-translate-x-12' : 'translate-x-12';
                
                // Estilos según estado
                let bgClass = isDesbloqueado ? 'bg-primary text-white shadow-[0_8px_0_#047857]' : 'bg-slate-200 text-slate-400 shadow-[0_8px_0_#94a3b8]';
                if(isActual) bgClass = 'bg-primary text-white shadow-[0_8px_0_#047857] ring-4 ring-emerald-200 ring-offset-4';
                
                const emoji = isDesbloqueado ? '⚔️' : '🔒';

                mapa.innerHTML += `
                <div class="node-path flex flex-col items-center justify-center transform ${margen}">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 bg-white px-2 py-1 rounded-full shadow-sm">Nivel ${batalla.id}</p>
                    <button 
                        onclick="${isDesbloqueado ? `iniciarBatalla(${batalla.id})` : ''}"
                        class="w-20 h-20 rounded-full flex items-center justify-center text-3xl transition-transform active:scale-95 ${bgClass} ${isDesbloqueado ? 'cursor-pointer hover:-translate-y-1' : 'cursor-not-allowed grayscale'}"
                    >
                        ${emoji}
                    </button>
                    ${isActual ? `<div class="absolute -top-4 animate-bounce text-2xl drop-shadow-md">👇</div>` : ''}
                </div>`;
            });
        }

        // 2. INICIAR BATALLA
        function iniciarBatalla(id) {
            if(vidas <= 0) return alert("No tienes vidas. ¡Espera a que se recarguen!");
            batallaActiva = BATTLES.find(b => b.id === id);
            pantallaActualIndex = 0;
            document.getElementById('battleModal').classList.remove('hidden');
            renderizarPantallaBatalla();
        }

        // 3. RENDERIZAR LA PANTALLA SEGÚN SU TIPO (El Motor Dinámico)
        function renderizarPantallaBatalla() {
            const pantalla = batallaActiva.screens[pantallaActualIndex];
            const content = document.getElementById('battleContent');
            const progress = ((pantallaActualIndex) / batallaActiva.screens.length) * 100;
            document.getElementById('battleProgress').style.width = `${progress}%`;
            
            // Ocultar feedback anterior
            document.getElementById('feedbackContainer').classList.add('hidden');
            content.innerHTML = '';

            // TIPO 1: VERDADERO O FALSO
            if(pantalla.type === 'boolean') {
                content.innerHTML = `
                    <div class="w-full max-w-sm">
                        <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center text-3xl mb-6 mx-auto shadow-inner">🤔</div>
                        <h2 class="text-2xl font-display font-bold text-slate-800 text-center leading-snug mb-8">${pantalla.question}</h2>
                        <div class="space-y-4">
                            <button onclick="verificarRespuesta(true)" class="w-full p-4 border-2 border-slate-200 rounded-2xl font-bold text-lg text-slate-600 hover:border-blue-400 hover:bg-blue-50 transition-all active:scale-95">A) Verdadero</button>
                            <button onclick="verificarRespuesta(false)" class="w-full p-4 border-2 border-slate-200 rounded-2xl font-bold text-lg text-slate-600 hover:border-blue-400 hover:bg-blue-50 transition-all active:scale-95">B) Falso</button>
                        </div>
                    </div>`;
            }
            
            // TIPO 2: TRIVIA MULTIPLE
            else if (pantalla.type === 'trivia') {
                let opcionesHTML = pantalla.options.map((op, idx) => `
                    <button onclick="verificarRespuesta(${idx})" class="w-full p-4 border-2 border-slate-200 rounded-2xl font-bold text-base text-slate-600 text-left hover:border-blue-400 hover:bg-blue-50 transition-all active:scale-95">
                        ${op}
                    </button>
                `).join('');

                content.innerHTML = `
                    <div class="w-full max-w-sm">
                        <h2 class="text-xl font-display font-bold text-slate-800 leading-snug mb-6">${pantalla.question}</h2>
                        <div class="space-y-3">${opcionesHTML}</div>
                    </div>`;
            }

            // TIPO 3: HISTORIA O CONCEPTO (Solo leer y continuar)
            else if (pantalla.type === 'story') {
                content.innerHTML = `
                    <div class="w-full max-w-sm text-center animate-fade-in">
                        <div class="text-6xl mb-6 drop-shadow-md">${pantalla.emoji || '📖'}</div>
                        <h2 class="text-2xl font-display font-black text-slate-800 mb-4">${pantalla.title || 'Atención'}</h2>
                        <p class="text-lg text-slate-600 leading-relaxed bg-slate-50 p-6 rounded-3xl border border-slate-100 shadow-sm">${pantalla.text}</p>
                        <button onclick="siguientePantalla()" class="w-full mt-8 py-4 bg-primary rounded-2xl font-black text-white text-lg tracking-wide uppercase transition-transform active:scale-95 shadow-[0_4px_0_#047857]">ENTENDIDO</button>
                    </div>`;
            }
        }

        // 4. VERIFICAR RESPUESTA Y MOSTRAR FEEDBACK COLORIDO
        function verificarRespuesta(respuestaUsuario) {
            const pantalla = batallaActiva.screens[pantallaActualIndex];
            const esCorrecta = respuestaUsuario === pantalla.correct;
            
            const fbContainer = document.getElementById('feedbackContainer');
            const fbIcon = document.getElementById('feedbackIcon');
            const fbTitle = document.getElementById('feedbackTitle');
            const fbText = document.getElementById('feedbackText');
            const btnCont = document.getElementById('btnContinuar');

            fbContainer.classList.remove('hidden');

            if (esCorrecta) {
                // Diseño de Acierto (Verde Duolingo)
                fbContainer.className = "fixed bottom-0 left-0 right-0 p-6 bg-emerald-100 border-t-2 border-emerald-200 z-20";
                fbIcon.className = "w-10 h-10 rounded-full bg-white text-primary flex items-center justify-center text-xl shadow-sm";
                fbIcon.innerHTML = "✔️";
                fbTitle.className = "text-xl font-display font-black text-emerald-800";
                fbTitle.innerText = "¡Excelente!";
                fbText.className = "text-sm font-medium text-emerald-700";
                btnCont.className = "w-full py-4 bg-primary rounded-2xl font-black text-white text-lg tracking-wide uppercase transition-transform active:scale-95 shadow-[0_4px_0_#047857] mt-2";
                btnCont.innerText = "Continuar";
                btnCont.onclick = siguientePantalla;
                
                // Recompensa en tiempo real
                monedas += 5;
                document.getElementById('monedasUI').innerText = monedas;
                
            } else {
                // Diseño de Error (Rojo Duolingo)
                document.getElementById('battleContent').classList.add('shake');
                setTimeout(() => document.getElementById('battleContent').classList.remove('shake'), 500);

                fbContainer.className = "fixed bottom-0 left-0 right-0 p-6 bg-rose-100 border-t-2 border-rose-200 z-20";
                fbIcon.className = "w-10 h-10 rounded-full bg-white text-danger flex items-center justify-center text-xl shadow-sm";
                fbIcon.innerHTML = "❌";
                fbTitle.className = "text-xl font-display font-black text-rose-800";
                fbTitle.innerText = "Respuesta incorrecta";
                fbText.className = "text-sm font-medium text-rose-700";
                btnCont.className = "w-full py-4 bg-danger rounded-2xl font-black text-white text-lg tracking-wide uppercase transition-transform active:scale-95 shadow-[0_4px_0_#be123c] mt-2";
                btnCont.innerText = "Entendido";
                btnCont.onclick = cerrarBatalla; // Si falla, pierde y sale.
                
                // Castigo
                vidas -= 1;
                document.getElementById('vidasUI').innerText = vidas;
            }
            
            fbText.innerText = pantalla.feedback || "";
        }

        // 5. FLUJO DEL JUEGO
        function siguientePantalla() {
            pantallaActualIndex++;
            if (pantallaActualIndex >= batallaActiva.screens.length) {
                // Ganó la batalla completa
                victoriaBatalla();
            } else {
                renderizarPantallaBatalla();
            }
        }

        function victoriaBatalla() {
            const content = document.getElementById('battleContent');
            document.getElementById('feedbackContainer').classList.add('hidden');
            document.getElementById('battleProgress').style.width = '100%';
            
            content.innerHTML = `
                <div class="text-center animate-bounce">
                    <div class="text-7xl mb-4 drop-shadow-lg">🏆</div>
                    <h2 class="text-3xl font-display font-black text-yellow-500 mb-2">¡TRINCHERA SUPERADA!</h2>
                    <p class="text-slate-500 font-bold mb-8">+25 Monedas de Oro</p>
                    <button onclick="completarNivel()" class="w-full max-w-xs mx-auto py-4 bg-primary rounded-2xl font-black text-white text-lg tracking-wide uppercase shadow-[0_4px_0_#047857] active:scale-95 transition-transform">Volver al Mapa</button>
                </div>`;
        }

        function completarNivel() {
            monedas += 25;
            if (batallaActiva.id === nivelActual) { nivelActual++; } // Desbloquea el siguiente
            document.getElementById('monedasUI').innerText = monedas;
            cerrarBatalla();
        }

        function cerrarBatalla() {
            document.getElementById('battleModal').classList.add('hidden');
            batallaActiva = null;
            renderizarMapa();
        }

        // Arrancar el juego al cargar
        window.onload = renderizarMapa;
    </script>
</body>
</html>
