<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Guerra del Capital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#10b981', background: '#f0fdf4', surface: '#ffffff', danger: '#f43f5e', warning: '#f59e0b', secondary: '#3b82f6' },
                    fontFamily: { display: ['Outfit', 'sans-serif'], body: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .map-bg { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
        .node-path { position: relative; z-index: 10; }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body class="font-body text-slate-800 bg-background map-bg min-h-screen pb-20 select-none">

    <header class="bg-surface sticky top-0 z-40 border-b border-slate-200 p-4 flex justify-between items-center shadow-sm">
        <a href="../arcade/index.html" class="text-slate-400 hover:text-slate-600 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </a>
        <div class="flex gap-4 font-black font-display text-lg">
            <div class="flex items-center gap-1 text-blue-500" title="Escudos (Vidas)"><span class="text-xl">🛡️</span> <span id="vidasUI">5</span></div>
            <div class="flex items-center gap-1 text-warning" title="Botín de Guerra (Monedas)"><span class="text-xl">💰</span> <span id="monedasUI">0</span></div>
        </div>
    </header>

    <main class="max-w-md mx-auto py-10 px-4 flex flex-col items-center gap-[60px]" id="mapaContenedor">
    </main>

    <div id="customModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center px-4 bg-slate-900/60 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-3xl shadow-2xl p-6 max-w-sm w-full text-center border border-slate-100">
            <div id="customModalIcon" class="text-5xl mb-4">⚠️</div>
            <h3 id="customModalTitle" class="text-xl font-display font-bold text-slate-900 mb-2">Atención</h3>
            <p id="customModalText" class="text-slate-600 text-sm mb-6 font-medium leading-relaxed"></p>
            <div id="customModalButtons" class="flex flex-col gap-3"></div>
        </div>
    </div>

    <div id="battleModal" class="hidden fixed inset-0 bg-surface z-50 flex flex-col">
        <div class="h-2 bg-slate-100 w-full"><div id="battleProgress" class="h-full bg-primary transition-all duration-300" style="width: 0%"></div></div>
        
        <button onclick="intentarCerrarBatalla()" class="absolute top-6 left-4 text-slate-400 hover:text-slate-600 z-10">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <div id="battleContent" class="flex-grow flex flex-col justify-center items-center px-6 py-10 max-w-lg mx-auto w-full overflow-y-auto">
        </div>

        <div id="feedbackContainer" class="hidden fixed bottom-0 left-0 right-0 p-6 bg-white border-t-2 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-20">
            <div class="max-w-lg mx-auto flex flex-col gap-3">
                <div class="flex items-center gap-3">
                    <div id="feedbackIcon" class="w-10 h-10 rounded-full flex items-center justify-center text-2xl font-black shrink-0"></div>
                    <h3 id="feedbackTitle" class="text-xl font-display font-black"></h3>
                </div>
                <p id="feedbackText" class="text-sm font-medium"></p>
                <button id="btnContinuar" class="w-full py-4 rounded-2xl font-black text-white text-lg tracking-wide uppercase transition-transform active:scale-95 shadow-[0_4px_0_rgba(0,0,0,0.2)] mt-2"></button>
            </div>
        </div>
    </div>

    <script src="niveles.js"></script>
    <script>
        // 1. SISTEMA DE GUARDADO
        let vidas = parseInt(localStorage.getItem('gc_vidas'));
        if(isNaN(vidas)) vidas = 5;
        let monedas = parseInt(localStorage.getItem('gc_monedas')) || 0;
        let nivelActual = parseInt(localStorage.getItem('gc_nivelActual')) || 1;

        function guardarProgreso() {
            localStorage.setItem('gc_vidas', vidas);
            localStorage.setItem('gc_monedas', monedas);
            localStorage.setItem('gc_nivelActual', nivelActual);
            document.getElementById('vidasUI').innerText = vidas;
            document.getElementById('monedasUI').innerText = monedas;
        }
        document.getElementById('vidasUI').innerText = vidas;
        document.getElementById('monedasUI').innerText = monedas;

        let batallaActiva = null;
        let pantallasPendientes = []; 
        let totalPantallas = 0;
        let contestadasCorrectamente = 0;

        function mostrarModalInfo(icono, titulo, texto, botonesHTML) {
            document.getElementById('customModalIcon').innerText = icono;
            document.getElementById('customModalTitle').innerText = titulo;
            document.getElementById('customModalText').innerText = texto;
            document.getElementById('customModalButtons').innerHTML = botonesHTML;
            document.getElementById('customModal').classList.remove('hidden');
        }

        function cerrarModalInfo() { document.getElementById('customModal').classList.add('hidden'); }

        // 2. DIBUJAR MAPA TÁCTICO (NUEVO DISEÑO VARIADO)
        function renderizarMapa() {
            const mapa = document.getElementById('mapaContenedor');
            mapa.innerHTML = '';
            const totalNiveles = BATTLES.length;

            [...BATTLES].reverse().forEach((batalla, drawnIndex) => {
                const realIndex = batalla.id - 1; 
                const isDesbloqueado = batalla.id <= nivelActual;
                const isActual = batalla.id === nivelActual;
                const isLeft = realIndex % 2 === 0;
                const margen = isLeft ? '-translate-x-12' : 'translate-x-12';
                
                let bgClass = isDesbloqueado ? 'bg-primary text-white shadow-[0_8px_0_#047857]' : 'bg-slate-200 text-slate-400 shadow-[0_8px_0_#94a3b8]';
                if(isActual) bgClass = 'bg-primary text-white shadow-[0_8px_0_#047857] ring-4 ring-emerald-200 ring-offset-4';
                
                // AQUÍ OCURRE LA MAGIA DEL DISEÑO: Si está desbloqueado lee el emoji específico de la batalla.
                const emoji = isDesbloqueado ? (batalla.mapEmoji || '🚩') : '🚧';

                let lineaSVG = '';
                if (drawnIndex < totalNiveles - 1) {
                    const nextNode = BATTLES.find(b => b.id === batalla.id - 1);
                    if (nextNode) {
                        const nextIsDesbloqueado = nextNode.id <= nivelActual;
                        const lineColor = nextIsDesbloqueado ? 'bg-emerald-300' : 'bg-slate-300';
                        const angulo = isLeft ? '-34.4deg' : '34.4deg';
                        lineaSVG = `<div class="absolute w-[6px] h-[170px] ${lineColor} z-0 rounded-full top-[40px]" style="transform: rotate(${angulo}); transform-origin: top center;"></div>`;
                    }
                }

                mapa.innerHTML += `
                <div class="node-path flex flex-col items-center justify-center transform ${margen}">
                    <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-0.5 bg-white px-3 py-1 rounded-full shadow-sm z-10 border border-slate-200">Batalla ${batalla.id}</p>
                    <p class="text-[11px] font-black text-slate-700 text-center mb-2 z-10 px-2 leading-tight max-w-[140px] drop-shadow-sm">${batalla.title}</p>
                    
                    <button onclick="${isDesbloqueado ? `iniciarBatalla(${batalla.id})` : ''}" class="w-20 h-20 rounded-full flex items-center justify-center text-4xl transition-transform active:scale-95 z-10 ${bgClass} ${isDesbloqueado ? 'cursor-pointer hover:-translate-y-1' : 'cursor-not-allowed grayscale'}">${emoji}</button>
                    ${isActual ? `<div class="absolute -top-3 animate-bounce text-3xl drop-shadow-md z-20">🪖</div>` : ''}
                    ${lineaSVG}
                </div>`;
            });
        }

        function recargarVidas(costo) {
            if (costo > 0) {
                if (monedas >= costo) {
                    monedas -= costo; vidas = 5; guardarProgreso(); cerrarModalInfo();
                    mostrarModalInfo('🛡️', '¡Blindaje Restaurado!', 'Tus escudos están al máximo. Vuelve al combate.', `<button onclick="cerrarModalInfo()" class="w-full py-3 bg-primary text-white rounded-xl font-bold">Entendido, Capitán</button>`);
                }
            } else {
                vidas = 5; guardarProgreso(); cerrarModalInfo();
                mostrarModalInfo('🚁', '¡Suministros Recibidos!', 'Te han enviado 5 escudos desde la base central.', `<button onclick="cerrarModalInfo()" class="w-full py-3 bg-primary text-white rounded-xl font-bold">Regresar al frente</button>`);
            }
        }

        function iniciarBatalla(id) {
            if(vidas <= 0) {
                let btnHtml = monedas >= 25 
                    ? `<button onclick="recargarVidas(25)" class="w-full py-3 bg-warning text-white rounded-xl font-bold shadow-md">Comprar 5 Escudos (25 💰)</button><button onclick="cerrarModalInfo()" class="w-full py-3 bg-slate-100 text-slate-600 rounded-xl font-bold">Retirarse</button>` 
                    : `<button onclick="recargarVidas(0)" class="w-full py-3 bg-primary text-white rounded-xl font-bold shadow-md">Pedir Suministros Gratis</button><button onclick="cerrarModalInfo()" class="w-full py-3 bg-slate-100 text-slate-600 rounded-xl font-bold">Retirarse</button>`;
                mostrarModalInfo('💥', 'Blindaje Destruido', 'No te quedan escudos para entrar en combate. Compra armadura con tu botín o pide apoyo.', btnHtml);
                return;
            }
            batallaActiva = BATTLES.find(b => b.id === id);
            pantallasPendientes = [...batallaActiva.screens];
            totalPantallas = pantallasPendientes.length; contestadasCorrectamente = 0;
            document.getElementById('battleProgress').style.width = '0%';
            document.getElementById('battleModal').classList.remove('hidden');
            renderizarPantallaBatalla();
        }

        let userOrderSelection = [];
        let currentOrderOptions = [];

        function renderizarPantallaBatalla() {
            if (pantallasPendientes.length === 0) { victoriaBatalla(); return; }

            const pantalla = pantallasPendientes[0];
            const content = document.getElementById('battleContent');
            const progress = (contestadasCorrectamente / totalPantallas) * 100;
            document.getElementById('battleProgress').style.width = `${progress}%`;
            document.getElementById('feedbackContainer').classList.add('hidden');
            content.innerHTML = '';

            if(pantalla.type === 'boolean') {
                content.innerHTML = `
                <div class="w-full max-w-sm">
                    <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center text-3xl mb-6 mx-auto shadow-inner">⚖️</div>
                    <h2 class="text-xl font-display font-bold text-slate-800 text-center leading-snug mb-8">${pantalla.question}</h2>
                    <div class="space-y-4">
                        <button onclick="verificarRespuesta(true)" class="w-full p-4 border-2 border-slate-200 rounded-2xl font-bold text-lg text-slate-600 hover:border-blue-400 hover:bg-blue-50 transition-all active:scale-95">Verdadero</button>
                        <button onclick="verificarRespuesta(false)" class="w-full p-4 border-2 border-slate-200 rounded-2xl font-bold text-lg text-slate-600 hover:border-blue-400 hover:bg-blue-50 transition-all active:scale-95">Falso</button>
                    </div>
                </div>`;
            } else if (pantalla.type === 'trivia') {
                let opcionesHTML = pantalla.options.map((op, idx) => `
                    <button onclick="verificarRespuesta(${idx})" class="w-full p-4 border-2 border-slate-200 rounded-2xl font-bold text-sm text-slate-600 text-left hover:border-blue-400 hover:bg-blue-50 transition-all active:scale-95">${op}</button>
                `).join('');
                content.innerHTML = `<div class="w-full max-w-sm"><h2 class="text-lg font-display font-bold text-slate-800 leading-snug mb-6">${pantalla.question}</h2><div class="space-y-3">${opcionesHTML}</div></div>`;
            } else if (pantalla.type === 'story' || pantalla.type === 'quote') {
                content.innerHTML = `
                <div class="w-full max-w-sm text-center animate-fade-in">
                    <div class="text-6xl mb-6 drop-shadow-md">${pantalla.emoji || '💡'}</div>
                    <h2 class="text-2xl font-display font-black text-slate-800 mb-4">${pantalla.title || 'Reporte de Inteligencia'}</h2>
                    <p class="text-base text-slate-600 leading-relaxed bg-slate-50 p-6 rounded-3xl border border-slate-100 shadow-sm whitespace-pre-line">${pantalla.text}</p>
                    <button onclick="verificarRespuesta('leido')" class="w-full mt-8 py-4 bg-primary rounded-2xl font-black text-white text-lg tracking-wide uppercase transition-transform active:scale-95 shadow-[0_4px_0_#047857]">Copiado, Capitán</button>
                </div>`;
            } else if (pantalla.type === 'order') {
                userOrderSelection = []; currentOrderOptions = [...pantalla.options];
                let html = `
                <div class="w-full max-w-sm">
                    <h2 class="text-lg font-display font-bold text-slate-800 leading-snug mb-2">${pantalla.question}</h2>
                    <div class="bg-blue-50 border border-blue-200 rounded-xl p-3 mb-6 flex gap-3 items-center">
                        <span class="text-2xl">👆</span>
                        <p class="text-xs text-blue-800 font-medium">Instrucción: Toca TODAS las opciones para armar la secuencia correcta.</p>
                    </div>
                    <div class="space-y-3" id="orderBox">`;
                
                currentOrderOptions.forEach((op, idx) => {
                    html += `<button id="opt-${idx}" onclick="handleOrderSelection(${idx})" class="w-full p-3 border-2 border-slate-200 rounded-xl font-bold text-sm text-slate-600 text-left hover:bg-slate-50 transition-all flex items-center gap-3">
                        <div class="w-6 h-6 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center text-xs shrink-0 transition-colors" id="badge-${idx}"></div>
                        <span>${op}</span></button>`;
                });
                html += `</div><button onclick="comprobarOrden()" class="w-full mt-8 py-4 bg-secondary rounded-2xl font-black text-white text-lg tracking-wide uppercase transition-transform active:scale-95 shadow-[0_4px_0_#0284c7]">EJECUTAR ORDEN</button></div>`;
                content.innerHTML = html;
            }
        }

        window.handleOrderSelection = (idx) => {
            const indexInSelection = userOrderSelection.indexOf(idx);
            if (indexInSelection > -1) { userOrderSelection.splice(indexInSelection, 1); } 
            else { userOrderSelection.push(idx); }
            
            currentOrderOptions.forEach((_, i) => {
                const badge = document.getElementById(`badge-${i}`); const btn = document.getElementById(`opt-${i}`);
                const pos = userOrderSelection.indexOf(i);
                if (pos > -1) { badge.innerText = pos + 1; badge.classList.replace('bg-slate-100', 'bg-secondary'); badge.classList.replace('text-slate-400', 'text-white'); btn.classList.replace('border-slate-200', 'border-secondary'); } 
                else { badge.innerText = ''; badge.classList.replace('bg-secondary', 'bg-slate-100'); badge.classList.replace('text-white', 'text-slate-400'); btn.classList.replace('border-secondary', 'border-slate-200'); }
            });
        }

        window.comprobarOrden = () => {
            if (userOrderSelection.length < currentOrderOptions.length) {
                document.getElementById('battleContent').classList.add('shake');
                setTimeout(() => document.getElementById('battleContent').classList.remove('shake'), 500);
                const fbContainer = document.getElementById('feedbackContainer');
                fbContainer.classList.remove('hidden');
                fbContainer.className = "fixed bottom-0 left-0 right-0 p-6 bg-amber-100 border-t-2 border-amber-200 z-20";
                document.getElementById('feedbackIcon').className = "w-10 h-10 rounded-full bg-white text-amber-500 flex items-center justify-center text-xl shadow-sm shrink-0";
                document.getElementById('feedbackIcon').innerHTML = "⚠️";
                document.getElementById('feedbackTitle').className = "text-xl font-display font-black text-amber-800";
                document.getElementById('feedbackTitle').innerText = "Secuencia Incompleta";
                document.getElementById('feedbackText').className = "text-sm font-medium text-amber-700";
                document.getElementById('feedbackText').innerText = "Capitán, debe asignar un número a cada opción antes de ejecutar la orden.";
                
                const btnCont = document.getElementById('btnContinuar');
                btnCont.className = "w-full py-4 bg-amber-500 rounded-2xl font-black text-white text-lg tracking-wide uppercase transition-transform active:scale-95 shadow-[0_4px_0_#d97706] mt-2";
                btnCont.innerText = "Entendido";
                btnCont.onclick = () => { fbContainer.classList.add('hidden'); };
                return;
            }
            verificarRespuesta(userOrderSelection);
        }

        window.verificarRespuesta = (respuestaUsuario) => {
            const pantalla = pantallasPendientes[0]; let esCorrecta = false;
            if (pantalla.type === 'story' || pantalla.type === 'quote') { esCorrecta = true; } 
            else if (pantalla.type === 'order') { esCorrecta = JSON.stringify(respuestaUsuario) === JSON.stringify(pantalla.correctOrder); } 
            else { esCorrecta = respuestaUsuario === pantalla.correct; }

            const fbContainer = document.getElementById('feedbackContainer');
            const fbIcon = document.getElementById('feedbackIcon');
            const fbTitle = document.getElementById('feedbackTitle');
            const fbText = document.getElementById('feedbackText');
            const btnCont = document.getElementById('btnContinuar');
            fbContainer.classList.remove('hidden');

            let textoLimpio = pantalla.feedback || "Revisa tus tácticas de combate.";
            textoLimpio = textoLimpio.replace('¡Excelente! ', '').replace('¡Correcto! ', '').replace('¡Exacto! ', '');

            if (esCorrecta) {
                fbContainer.className = "fixed bottom-0 left-0 right-0 p-6 bg-emerald-100 border-t-2 border-emerald-200 z-20";
                fbIcon.className = "w-10 h-10 rounded-full bg-white text-primary flex items-center justify-center text-xl shadow-sm shrink-0";
                fbIcon.innerHTML = "🎯";
                fbTitle.className = "text-xl font-display font-black text-emerald-800";
                fbTitle.innerText = "¡Ataque Exitoso!";
                fbText.className = "text-sm font-medium text-emerald-700";
                fbText.innerText = "¡Bien hecho! " + textoLimpio;
                
                btnCont.className = "w-full py-4 bg-primary rounded-2xl font-black text-white text-lg tracking-wide uppercase transition-transform active:scale-95 shadow-[0_4px_0_#047857] mt-2";
                btnCont.innerText = "Avanzar";
                
                monedas += 5; guardarProgreso();
                btnCont.onclick = () => { pantallasPendientes.shift(); contestadasCorrectamente++; renderizarPantallaBatalla(); };
            } else {
                document.getElementById('battleContent').classList.add('shake');
                setTimeout(() => document.getElementById('battleContent').classList.remove('shake'), 500);

                vidas -= 1; guardarProgreso();

                fbContainer.className = "fixed bottom-0 left-0 right-0 p-6 bg-rose-100 border-t-2 border-rose-200 z-20";
                fbIcon.className = "w-10 h-10 rounded-full bg-white text-danger flex items-center justify-center text-xl shadow-sm shrink-0";
                fbIcon.innerHTML = "💥";
                fbTitle.className = "text-xl font-display font-black text-rose-800";
                fbTitle.innerText = "¡Fuego Enemigo!";
                fbText.className = "text-sm font-medium text-rose-700";
                fbText.innerText = "Recuerda: " + textoLimpio;
                
                btnCont.className = "w-full py-4 bg-danger rounded-2xl font-black text-white text-lg tracking-wide uppercase transition-transform active:scale-95 shadow-[0_4px_0_#be123c] mt-2";
                btnCont.innerText = "Reagruparse";
                
                btnCont.onclick = () => {
                    if (vidas <= 0) { cerrarBatalla(); setTimeout(() => iniciarBatalla(batallaActiva.id), 300); } 
                    else {
                        const pantallaFallida = pantallasPendientes.shift();
                        pantallasPendientes.push(pantallaFallida);
                        renderizarPantallaBatalla();
                    }
                };
            }
        }

        function victoriaBatalla() {
            const content = document.getElementById('battleContent');
            document.getElementById('feedbackContainer').classList.add('hidden');
            document.getElementById('battleProgress').style.width = '100%';
            
            // Emoji gigante dinámico de victoria
            const emojiVictoria = batallaActiva.mapEmoji || '🚩';

            content.innerHTML = `
            <div class="text-center animate-bounce">
                <div class="text-7xl mb-4 drop-shadow-lg">${emojiVictoria}</div>
                <h2 class="text-3xl font-display font-black text-yellow-500 mb-2">¡TERRITORIO CONQUISTADO!</h2>
                <p class="text-slate-500 font-bold mb-8">+25 Botín de Guerra 💰</p>
                <button onclick="completarNivel()" class="w-full max-w-xs mx-auto py-4 bg-primary rounded-2xl font-black text-white text-lg tracking-wide uppercase shadow-[0_4px_0_#047857] active:scale-95 transition-transform">Volver a la Base</button>
            </div>`;
        }

        window.completarNivel = () => {
            monedas += 25;
            if (batallaActiva.id === nivelActual) { nivelActual++; } 
            guardarProgreso(); cerrarBatalla();
        }

        window.intentarCerrarBatalla = () => {
            mostrarModalInfo('🏃', '¿Retirada Táctica?', 'Si sales ahora, perderás el avance en esta trinchera, pero conservarás tu botín y escudos.', `
                <button onclick="confirmarCerrarBatalla()" class="w-full py-3 bg-danger text-white rounded-xl font-bold shadow-md">Sí, abortar misión</button>
                <button onclick="cerrarModalInfo()" class="w-full py-3 bg-slate-100 text-slate-600 rounded-xl font-bold">No, seguir peleando</button>
            `);
        }

        window.confirmarCerrarBatalla = () => { cerrarModalInfo(); cerrarBatalla(); }
        function cerrarBatalla() { document.getElementById('battleModal').classList.add('hidden'); batallaActiva = null; renderizarMapa(); }
        window.onload = renderizarMapa;
    </script>
</body>
</html>
